version: '3.8'

services:
  app:
    build: .
    ports:
      - "3007:3007"
    environment:
      - DATABASE_URL=postgresql://root:password@postgres:5432/claim_assessment?schema=public
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: claim_assessment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
